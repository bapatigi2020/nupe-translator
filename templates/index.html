<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English ⇄ Nupe Translator</title>

  <style>
    :root{
      --bg-url: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
    }

    body{
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #fff;

      /* Default background image (swapped by JS using --bg-url) */
      background: var(--bg-url) no-repeat center center / cover;
      transition: background-image 900ms ease-in-out;
    }

    /* Dark blur overlay */
    body::before{
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(5px);
      z-index: 0;
    }

    /* Animated cultural layer (only visible when .bg-animated is on body) */
    body::after{
      content: "";
      position: absolute;
      inset: -40%;
      z-index: 0;
      opacity: 0;
      transition: opacity 700ms ease;
      pointer-events: none;

      background:
        radial-gradient(circle at 20% 30%, rgba(0,255,204,0.25), transparent 45%),
        radial-gradient(circle at 80% 20%, rgba(33,150,243,0.25), transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(255,193,7,0.18), transparent 45%),
        linear-gradient(120deg, rgba(0,0,0,0.6), rgba(0,0,0,0.25)),
        linear-gradient(120deg, #0b3d2e, #0b2b5c, #4a0b5c, #5c2b0b);
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 300% 300%;
      animation: culturalShift 18s ease-in-out infinite;
      filter: saturate(120%);
    }

    body.bg-animated::after{
      opacity: 1;
    }

    @keyframes culturalShift{
      0%   { transform: translate(0,0) rotate(0deg); background-position: 0% 50%; }
      50%  { transform: translate(-2%, -2%) rotate(3deg); background-position: 100% 50%; }
      100% { transform: translate(0,0) rotate(0deg); background-position: 0% 50%; }
    }

    .container{
      position: relative;
      z-index: 1;
      width: min(92vw, 550px);
      padding: 32px 22px;
      border-radius: 16px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    h2{
      text-align: center;
      margin: 0 0 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-size: clamp(20px, 3.8vw, 28px);
    }

    label{
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      opacity: 0.95;
    }

    select, input[type="text"]{
      width: 100%;
      padding: 12px;
      margin: 10px 0 16px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.88);
      outline: none;
      box-sizing: border-box;
    }

    input[type="submit"]{
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: linear-gradient(135deg, #2196f3, #00bcd4);
      color: white;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    input[type="submit"]:hover{
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .direction-row{
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn{
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
      white-space: nowrap;
    }

    .icon-btn:hover{
      transform: scale(1.05);
      background: #fff;
    }

    .translation{
      margin-top: 16px;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      color: #00ffcc;
      word-wrap: break-word;
    }

    .btn-group{
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 420px){
      .container{ padding: 26px 16px; }
      select, input[type="text"]{ font-size: 15px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>English ⇄ Nupe Translator</h2>

    <form method="post" onsubmit="return validateInput()">
      <label for="direction">Translation Direction:</label>

      <div class="direction-row">
        <select name="direction" id="direction">
          <option value="en_to_nupe">English to Nupe</option>
          <option value="nupe_to_en">Nupe to English</option>
        </select>
        <button type="button" class="icon-btn" onclick="swapDirection()">↔️</button>
      </div>

      <label for="text_input">Enter Text:</label>
      <!-- changed to textarea so it can accept long text/sentences -->
      <textarea
        name="text_input"
        id="text_input"
        placeholder="Type here..."
        required
        style="width:100%; padding:12px; min-height:90px; border-radius:10px; border:none; font-size:16px; background:rgba(255,255,255,0.88); box-sizing:border-box; resize:vertical;"
      ></textarea>

      <input type="submit" value="Translate" />
    </form>

    {% if translation %}
      <div class="translation" id="translatedText">
        <p><strong>Translation:</strong> {{ translation }}</p>
      </div>

      <div class="btn-group">
        <button type="button" class="icon-btn" onclick="copyToClipboard()">📋 Copy</button>
        <button type="button" class="icon-btn" onclick="speakText()">🔊 Speak</button>
      </div>
    {% endif %}
  </div>

  <script>
    // --- BACKGROUND ROTATOR (every 60 seconds) ---
    const backgrounds = [
      {
        type: "image",
        url: 'url("https://images.unsplash.com/photo-1506744038136-46273834b3fb")',
        animated: false
      },
      {
        type: "animated",
        animated: true
      },
      {
        type: "image",
        // Put the Pinterest image into /static and rename it:
        // static/nupe-people.jpg
        url: 'url("/static/nupe-people.jpg")',
        animated: false
      }
    ];

    let bgIndex = 0;

    function applyBackground(i){
      const bg = backgrounds[i];

      // toggle animated layer
      document.body.classList.toggle("bg-animated", !!bg.animated);

      // set base image if provided
      if (bg.type === "image" && bg.url){
        document.documentElement.style.setProperty("--bg-url", bg.url);
      }
    }

    applyBackground(bgIndex);

    setInterval(() => {
      bgIndex = (bgIndex + 1) % backgrounds.length;
      applyBackground(bgIndex);
    }, 60000);

    // --- FORM + ACTION BUTTONS ---
    function validateInput() {
      const input = document.getElementById('text_input').value.trim();
      if (input.length < 2) {
        alert("Please enter more than one character.");
        return false;
      }
      return true;
    }

    function swapDirection() {
      const select = document.getElementById('direction');
      select.value = (select.value === "en_to_nupe") ? "nupe_to_en" : "en_to_nupe";
    }

    function copyToClipboard() {
      const el = document.getElementById("translatedText");
      if (!el) return;

      const text = el.innerText.replace("Translation:", "").trim();
      navigator.clipboard.writeText(text).then(() => {
        alert("Copied to clipboard!");
      }).catch(() => {
        alert("Failed to copy.");
      });
    }

    function speakText() {
      const el = document.getElementById("translatedText");
      if (!el) return;

      const text = el.innerText.replace("Translation:", "").trim();
      const utterance = new SpeechSynthesisUtterance(text);
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
