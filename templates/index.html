<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English ⇄ Nupe Translator</title>

  <style>
    :root{
      --bg-url: url("/static/images.png"); /* default */
    }

    *{ box-sizing:border-box; }

    body{
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #fff;

      /* background only (no animated layer) */
      background: var(--bg-url) no-repeat center center / cover;
      transition: background-image 500ms ease-in-out;
    }

    /* Dark overlay (no blur -> faster on phones) */
    body::before{
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.58);
      z-index: 0;
    }

    .container{
      position: relative;
      z-index: 1;

      /* responsive width for all phones */
      width: min(92vw, 560px);
      margin: 16px;

      padding: 22px 16px;
      border-radius: 16px;

      /* lightweight glass (no heavy blur) */
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 14px 34px rgba(0,0,0,0.35);
    }

    h2{
      text-align: center;
      margin: 0 0 14px;
      font-weight: 800;
      letter-spacing: 0.3px;
      font-size: clamp(18px, 4.6vw, 28px);
    }

    label{
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      opacity: 0.95;
      font-size: 14px;
    }

    .direction-row{
      display: flex;
      align-items: center;
      gap: 10px;
    }

    select, textarea{
      width: 100%;
      padding: 12px;
      margin: 10px 0 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.92);
      outline: none;
      color: #111;
    }

    textarea{
      min-height: 110px;
      resize: vertical;
      line-height: 1.35;
    }

    input[type="submit"]{
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #2196f3, #00bcd4);
      color: white;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      will-change: transform;
      touch-action: manipulation;
    }

    input[type="submit"]:active{
      transform: translateY(1px);
    }

    input[type="submit"]:hover{
      box-shadow: 0 10px 22px rgba(0,0,0,0.25);
    }

    .icon-btn{
      padding: 10px 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.92);
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
      white-space: nowrap;
      touch-action: manipulation;
    }

    .icon-btn:active{
      transform: scale(0.98);
    }

    .translation{
      margin-top: 14px;
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      color: #00ffcc;
      word-wrap: break-word;
    }

    .btn-group{
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    /* very small phones */
    @media (max-width: 360px){
      .container{ padding: 18px 12px; }
      select, textarea{ font-size: 15px; }
    }

    /* reduce motion for users who prefer it (also helps low-end phones) */
    @media (prefers-reduced-motion: reduce){
      body{ transition: none; }
      input[type="submit"], .icon-btn{ transition: none; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>English ⇄ Nupe Translator</h2>

    <form method="post" onsubmit="return validateInput()">
      <label for="direction">Translation Direction:</label>

      <div class="direction-row">
        <select name="direction" id="direction">
          <option value="en_to_nupe">English to Nupe</option>
          <option value="nupe_to_en">Nupe to English</option>
        </select>
        <button type="button" class="icon-btn" onclick="swapDirection()">↔️</button>
      </div>

      <label for="text_input">Enter Text:</label>
      <textarea
        name="text_input"
        id="text_input"
        placeholder="Type here..."
        required
      ></textarea>

      <input type="submit" value="Translate" />
    </form>

    {% if translation %}
      <div class="translation" id="translatedText">
        <p><strong>Translation:</strong> {{ translation }}</p>
      </div>

      <div class="btn-group">
        <button type="button" class="icon-btn" onclick="copyToClipboard()">📋 Copy</button>
        <button type="button" class="icon-btn" onclick="speakText()">🔊 Speak</button>
      </div>
    {% endif %}
  </div>

  <script>
    // ✅ 2 image backgrounds only (no animated background)
    // Put these files inside your Flask static folder:
    //   /static/images.png
    //   /static/nupe-people.jpg
    const backgrounds = [
      'url("/static/images.png")',
      'url("/static/nupe-people.jpg")'
    ];

    let bgIndex = 0;

    function applyBackground(i){
      document.documentElement.style.setProperty("--bg-url", backgrounds[i]);
    }

    applyBackground(bgIndex);

    // ✅ change every 30 seconds as requested
    setInterval(() => {
      bgIndex = (bgIndex + 1) % backgrounds.length;
      applyBackground(bgIndex);
    }, 20000);

    // --- FORM + ACTION BUTTONS ---
    function validateInput() {
      const input = document.getElementById('text_input').value.trim();
      if (input.length < 2) {
        alert("Please enter more than one character.");
        return false;
      }
      return true;
    }

    function swapDirection() {
      const select = document.getElementById('direction');
      select.value = (select.value === "en_to_nupe") ? "nupe_to_en" : "en_to_nupe";
    }

    function copyToClipboard() {
      const el = document.getElementById("translatedText");
      if (!el) return;

      const text = el.innerText.replace("Translation:", "").trim();
      navigator.clipboard.writeText(text).then(() => {
        alert("Copied to clipboard!");
      }).catch(() => {
        alert("Failed to copy.");
      });
    }

    function speakText() {
      const el = document.getElementById("translatedText");
      if (!el) return;

      const text = el.innerText.replace("Translation:", "").trim();
      const utterance = new SpeechSynthesisUtterance(text);
      speechSynthesis.cancel(); // stop previous speech (prevents overlap)
      speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
